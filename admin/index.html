<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم Anime Watcher</title>
  
  <!-- Cairo Font for beautiful Arabic typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Our Custom CSS Style -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">A</div>
      <div class="logo-title">
        <h1>لوحة تحكم Anime Watcher</h1>
        <p>إدارة مسلسلات الأنمي والحلقات المرفوعة</p>
      </div>
    </div>
    <div>
      <button class="btn btn-primary" onclick="openAddAnimeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
        </svg>إضافة أنمي جديد
      </button>
    </div>
  </header>

  <!-- Main Content Layout -->
  <main class="dashboard-container">
    
    <!-- Right or Left Section depending on RTL - Main Directory -->
    <section class="dashboard-section" style="grid-column: span 1;">
      
      <!-- Statistics Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-icon">🎬</div>
          <div class="stat-info">
            <span class="stat-value" id="totalAnime">0</span>
            <span class="stat-label">إجمالي الأنميات</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎞️</div>
          <div class="stat-info">
            <span class="stat-value" id="totalEpisodes">0</span>
            <span class="stat-label">إجمالي الحلقات</span>
          </div>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="search-bar-container">
        <input type="text" id="searchInput" class="form-control" placeholder="البحث بالاسم، التصنيف أو الوصف..." style="flex: 1;">
        <select id="filterStatus" class="form-control" style="width: 150px;">
          <option value="all">كل الحالات</option>
          <option value="مستمر">مستمر</option>
          <option value="مكتمل">مكتمل</option>
        </select>
      </div>

      <!-- Anime Grid -->
      <div class="section-header">
        <h2 class="section-title">دليل مسلسلات الأنمي</h2>
      </div>
      <div class="anime-grid" id="animeGrid">
        <!-- Live populated via JS -->
      </div>
    </section>

    <!-- Side Panel: Episode Management of Selected Anime -->
    <section class="dashboard-section" id="episodePanel" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">📺 حلقات: <span id="selectedAnimeTitle" style="color: var(--accent-color);">...</span></h2>
      </div>

      <!-- List of existing episodes -->
      <div class="episodes-list" id="episodesList">
        <!-- Live populated via JS -->
      </div>

      <!-- Add/Edit Episode Form inside side-panel -->
      <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 1rem;">
        <h3 id="episodeFormTitle" style="font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-primary);">إضافة حلقة جديدة</h3>
        
        <form id="episodeForm" style="display: flex; flex-direction: column; gap: 1rem;">
          <div class="form-row">
            <div class="form-group" style="flex: 1;">
              <label for="episodeNumber">رقم الحلقة <span style="color: var(--danger-color);">*</span></label>
              <input type="number" id="episodeNumber" class="form-control" placeholder="مثال: 1" required>
            </div>
            <div class="form-group" style="flex: 2;">
              <label for="episodeTitle">عنوان الحلقة (اختياري)</label>
              <input type="text" id="episodeTitle" class="form-control" placeholder="عنوان الحلقة الخاص">
            </div>
          </div>

          <div class="form-group">
            <label for="episodeVideo">رابط الفيديو (رابط تشغيل مباشر أو Firebase) <span style="color: var(--danger-color);">*</span></label>
            <input type="url" id="episodeVideo" class="form-control" placeholder="https://..." required>
          </div>

          <div class="form-row" style="align-items: flex-end;">
            <div class="form-group" style="flex: 1;">
              <label for="episodeDuration">مدة الحلقة (اختياري)</label>
              <input type="text" id="episodeDuration" class="form-control" placeholder="مثال: 24:00">
            </div>
            <div>
              <button type="submit" class="btn btn-primary" id="btnSaveEpisode" style="width: 100%; justify-content: center;">إضافة الحلقة</button>
            </div>
          </div>
        </form>
      </div>
    </section>

  </main>

  <!-- Add/Edit Anime Modal Dialog -->
  <div class="modal-overlay" id="animeModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeAnimeModal()">&times;</button>
      <h2 id="animeModalTitle" style="font-size: 1.4rem; color: var(--text-primary);">إضافة أنمي جديد</h2>
      
      <form id="animeForm" style="display: flex; flex-direction: column; gap: 1.2rem;">
        <div class="form-group">
          <label for="animeTitle">اسم الأنمي <span style="color: var(--danger-color);">*</span></label>
          <input type="text" id="animeTitle" class="form-control" placeholder="اسم الأنمي باللغة العربية أو الإنجليزية" required>
        </div>

        <div class="form-group">
          <label for="animeDescription">وصف الأنمي <span style="color: var(--danger-color);">*</span></label>
          <textarea id="animeDescription" class="form-control" rows="3" placeholder="قصة الأنمي وتفاصيل قصيرة..." required></textarea>
        </div>

        <div class="form-group">
          <label for="animeImage">رابط صورة الغلاف <span style="color: var(--danger-color);">*</span></label>
          <input type="url" id="animeImage" class="form-control" placeholder="https://example.com/cover.jpg" required>
        </div>

        <div class="form-row">
          <div class="form-group" style="flex: 1;">
            <label for="animeCategory">التصنيف <span style="color: var(--danger-color);">*</span></label>
            <input type="text" id="animeCategory" class="form-control" placeholder="مثال: أكشن، مغامرة" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="animeYear">سنة الإنتاج (اختياري)</label>
            <input type="number" id="animeYear" class="form-control" placeholder="مثال: 2024">
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="animeStatus">حالة الأنمي</label>
            <select id="animeStatus" class="form-control">
              <option value="مستمر">مستمر</option>
              <option value="مكتمل">مكتمل</option>
            </select>
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem;">
          <button type="button" class="btn btn-secondary" onclick="closeAnimeModal()">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ البيانات</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Scripts (v8 Compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Main JavaScript App Logic -->
  <script src="app.js"></script>
</body>
</html>
